name: Deploy to GitHub Pages

on:
  push:
    branches: [main]   # troque para "master" se for o nome da sua branch padrão

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Injetar versão do cache no sw.js
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          sed -i "s/__BUILD_VERSION__/${SHORT_SHA}/" sw.js
          echo "Cache versionado como cashly-${SHORT_SHA}"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
