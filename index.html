<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>PataCare — Caderneta do Pet</title>
<meta name="description" content="Caderneta digital para cuidar dos seus pets: vacinas, antipulgas, vermífugos, peso e cio.">

<!-- iOS / PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PataCare">
<meta name="theme-color" content="#F2598A">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
<link rel="manifest" href="manifest.json">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">

<!-- Aplica o tema salvo antes de qualquer render, para o splash já nascer na cor certa -->
<script>
(function () {
  try {
    var m = localStorage.getItem("patacare-theme");
    var dark = m === "dark" || (m !== "light" && matchMedia("(prefers-color-scheme: dark)").matches);
    document.documentElement.dataset.theme = dark ? "dark" : "light";
  } catch (e) {}
  window.__splashShownAt = Date.now();
})();
</script>

<!-- Splash screen: CSS inline para aparecer imediatamente, antes do bundle carregar -->
<style>
  #splash {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    background: #fff8f3;
    transition: opacity 0.4s ease, visibility 0.4s ease;
  }
  html[data-theme="dark"] #splash { background: #221721; }
  #splash.splash-hide {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }
  #splash img {
    width: 132px;
    height: auto;
    border-radius: 30px;
    box-shadow: 0 16px 40px -8px rgba(58, 34, 54, 0.25);
    animation: splash-pop 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  html[data-theme="dark"] #splash img { box-shadow: 0 16px 40px -8px rgba(0, 0, 0, 0.55); }
  #splash .splash-dots {
    display: flex;
    gap: 8px;
  }
  #splash .splash-dots span {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: #f2598a;
    animation: splash-dot 1s ease-in-out infinite;
  }
  html[data-theme="dark"] #splash .splash-dots span { background: #ff7ca3; }
  #splash .splash-dots span:nth-child(2) { animation-delay: 0.15s; }
  #splash .splash-dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes splash-pop {
    from { transform: scale(0.7); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  @keyframes splash-dot {
    0%, 100% { opacity: 0.35; transform: translateY(0); }
    50% { opacity: 1; transform: translateY(-4px); }
  }
</style>
</head>
<body>

<div id="splash">
  <img src="icons/logo-full-512.png" alt="PataCare">
  <div class="splash-dots"><span></span><span></span><span></span></div>
</div>

<div id="root"></div>
<div id="overlay-root"></div>

<!-- Google Identity Services — necessário para o backup automático no Google Drive -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script type="module" src="/src/main.tsx"></script>
</body>
</html>
