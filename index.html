<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>PataCare — Caderneta do Pet</title>
<meta name="description" content="Caderneta digital para cuidar dos seus pets: vacinas, antipulgas, vermífugos, peso e cio.">

<!-- iOS / PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PataCare">
<meta name="theme-color" content="#F2598A">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
<link rel="manifest" href="manifest.json">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">

<style>
/* ============================================================
   PataCare — Design tokens
   ============================================================ */
:root{
  /* Light theme (default) */
  --bg: #FFF8F3;
  --bg-soft: #FFEFF3;
  --surface: #FFFFFF;
  --surface-2: #FDE6ED;
  --border: #F6D3DE;
  --text: #3A2236;
  --text-muted: #8C6677;
  --text-faint: #C9A6B6;

  --pink: #F2598A;
  --pink-strong: #C23A6B;
  --pink-soft: #FFD3E0;
  --peach: #FFB37C;
  --peach-soft: #FFE3C8;
  --mint: #4FB29A;
  --mint-soft: #D9F0E9;
  --gold: #E0A634;
  --red: #E25563;
  --red-soft: #FBE0E2;

  --shadow-sm: 0 1px 2px rgba(58,34,54,.06), 0 1px 1px rgba(58,34,54,.04);
  --shadow-md: 0 6px 16px -4px rgba(58,34,54,.14), 0 2px 6px rgba(58,34,54,.06);
  --shadow-lg: 0 16px 40px -8px rgba(58,34,54,.22);

  --radius-sm: 10px;
  --radius-md: 16px;
  --radius-lg: 24px;
  --radius-pill: 999px;

  --font-display: 'Baloo 2', system-ui, sans-serif;
  --font-body: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html[data-theme="dark"]{
  --bg: #221721;
  --bg-soft: #2C1C29;
  --surface: #2E1E2B;
  --surface-2: #3A2535;
  --border: #4A2F42;
  --text: #FBE9F0;
  --text-muted: #C99AB0;
  --text-faint: #8A6377;

  --pink: #FF7CA3;
  --pink-strong: #FF9DBC;
  --pink-soft: #4A2A3B;
  --peach: #FFB37C;
  --peach-soft: #4A3526;
  --mint: #5FCBAE;
  --mint-soft: #1E3A33;
  --gold: #E8BB5E;
  --red: #FF7E8A;
  --red-soft: #452126;

  --shadow-sm: 0 1px 2px rgba(0,0,0,.3);
  --shadow-md: 0 6px 16px -4px rgba(0,0,0,.45), 0 2px 6px rgba(0,0,0,.3);
  --shadow-lg: 0 16px 40px -8px rgba(0,0,0,.55);
}

*{ box-sizing: border-box; }
html,body{ margin:0; padding:0; overflow-x: hidden; width: 100%; max-width: 100%; touch-action: pan-y; }
body{
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  overscroll-behavior-y: none;
  overscroll-behavior-x: none;
  position: relative;
  transition: background .2s ease, color .2s ease;
}
h1,h2,h3,h4,.display{ font-family: var(--font-display); font-weight: 700; margin: 0; letter-spacing: .2px; }
p{ margin: 0; }
button{ font-family: inherit; }
a{ color: inherit; text-decoration: none; }
input, select, textarea{ font-family: inherit; }

/* scrollbars unobtrusive */
::-webkit-scrollbar{ width: 0; height: 0; }

/* App shell */
#app{
  max-width: 560px;
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
  padding-bottom: calc(86px + var(--safe-bottom));
  background: var(--bg);
}

.topbar{
  position: sticky;
  top: 0;
  z-index: 20;
  padding: calc(14px + var(--safe-top)) 18px 14px;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  border-bottom: 1px solid transparent;
}
.topbar.scrolled{ border-bottom-color: var(--border); box-shadow: var(--shadow-sm); }
.topbar .brand{ display:flex; align-items:center; gap:8px; }
.topbar .brand .logo-dot{
  width: 30px; height:30px; border-radius: 50%; background: var(--pink);
  display:flex; align-items:center; justify-content:center; box-shadow: var(--shadow-sm);
  flex-shrink: 0; overflow:hidden;
}
.topbar .brand .logo-dot img{ width:100%; height:100%; object-fit:cover; display:block; }
.topbar h1{ font-size: 20px; color: var(--text); }
.topbar-actions{ display:flex; align-items:center; gap:6px; }
.icon-btn{
  width: 38px; height: 38px; border-radius: 50%;
  display:flex; align-items:center; justify-content:center;
  background: var(--surface); border: 1px solid var(--border);
  cursor:pointer; transition: transform .15s ease, background .15s ease;
}
.icon-btn:active{ transform: scale(.92); }
.icon-btn svg{ width:18px; height:18px; stroke: var(--text); fill:none; }

main.view{ padding: 4px 18px 28px; animation: fadein .22s ease; }
@keyframes fadein{ from{ opacity:0; transform: translateY(6px);} to{ opacity:1; transform:none; } }

/* Bottom nav */
.bottombar{
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 30;
  max-width: 560px; margin: 0 auto;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display:flex; justify-content: space-around;
  padding: 8px 6px calc(8px + var(--safe-bottom));
  box-shadow: 0 -4px 18px rgba(58,34,54,.08);
}
.nav-item{
  display:flex; flex-direction:column; align-items:center; gap:3px;
  font-size: 11px; color: var(--text-faint); padding: 6px 14px; border-radius: var(--radius-sm);
  cursor:pointer; flex: 1; max-width: 110px; font-weight: 600;
}
.nav-item svg{ width:22px; height:22px; stroke: var(--text-faint); fill:none; stroke-width:1.8; }
.nav-item.active{ color: var(--pink-strong); }
.nav-item.active svg{ stroke: var(--pink); fill: var(--pink-soft); }

/* FAB */
.fab{
  position: fixed; right: calc(50% - 280px + 18px); bottom: calc(78px + var(--safe-bottom));
  z-index: 25;
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--pink); color:#fff; border:none;
  display:flex; align-items:center; justify-content:center;
  box-shadow: var(--shadow-lg); cursor:pointer;
}
@media (max-width: 596px){ .fab{ right: 18px; } }
.fab svg{ width:24px; height:24px; stroke:#fff; fill:none; stroke-width:2.2; }
.fab:active{ transform: scale(.94); }

/* Cards */
.card{
  background: var(--surface);
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  padding: 16px;
}
.section-title{
  font-family: var(--font-display); font-size: 14px; font-weight: 700;
  color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em;
  margin: 22px 2px 10px;
}
.section-title:first-child{ margin-top: 6px; }

/* Pet card (home list) */
.pet-card{
  display:flex; align-items:center; gap:14px;
  background: var(--surface); border:1px solid var(--border);
  border-radius: var(--radius-lg); padding: 14px; margin-bottom: 12px;
  box-shadow: var(--shadow-sm); cursor:pointer; transition: transform .12s ease;
}
.pet-card:active{ transform: scale(.985); }
.pet-avatar{
  width: 60px; height:60px; border-radius: 50%; object-fit: cover; flex-shrink:0;
  background: var(--pink-soft); border: 2px solid var(--surface); box-shadow: 0 0 0 2px var(--pink-soft);
}
.pet-avatar.placeholder{ display:flex; align-items:center; justify-content:center; }
.pet-avatar.placeholder svg{ width:28px; height:28px; stroke: var(--pink); fill:none; }
.pet-card-info{ flex:1; min-width:0; }
.pet-card-info h3{ font-size:17px; color: var(--text); }
.pet-card-info .meta{ font-size: 13px; color: var(--text-muted); margin-top:2px; }
.pet-card-badges{ display:flex; gap:6px; margin-top:7px; flex-wrap: wrap; }
.chip{
  font-size: 11px; font-weight:700; padding: 3px 9px; border-radius: var(--radius-pill);
  display:inline-flex; align-items:center; gap:4px; white-space: nowrap;
}
.chip.alert{ background: var(--red-soft); color: var(--red); }
.chip.soon{ background: var(--peach-soft); color: #9C5A12; }
.chip.ok{ background: var(--mint-soft); color: var(--mint); }
html[data-theme="dark"] .chip.soon{ color: var(--peach); }

.chevron{ display:inline-flex; flex-shrink:0; }
.chevron svg{ width:18px; height:18px; stroke: var(--text-faint); fill:none; }
.btn svg{ width:18px; height:18px; flex-shrink:0; stroke: currentColor; fill:none; }
.tab svg{ width:15px; height:15px; flex-shrink:0; stroke: currentColor; fill:none; }
.chip svg{ width:12px; height:12px; flex-shrink:0; stroke: currentColor; fill:none; }
.record-next svg{ width:14px; height:14px; flex-shrink:0; stroke: currentColor; fill:none; }

/* Empty state */
.empty-state{
  text-align:center; padding: 56px 20px 20px; color: var(--text-muted);
}
.empty-state .paw-stack{ font-size: 46px; margin-bottom: 14px; opacity:.7; }
.empty-state h3{ color: var(--text); font-size:19px; margin-bottom:6px; }
.empty-state p{ font-size: 14px; line-height:1.5; margin-bottom: 18px; }

/* Buttons */
.btn{
  border: none; border-radius: var(--radius-pill); padding: 13px 22px;
  font-weight: 700; font-size: 15px; cursor:pointer; display:inline-flex; align-items:center;
  justify-content:center; gap:8px; transition: transform .12s ease, opacity .15s ease;
  font-family: var(--font-body);
}
.btn:active{ transform: scale(.96); }
.btn-primary{ background: var(--pink); color:#fff; box-shadow: var(--shadow-md); }
.btn-secondary{ background: var(--surface-2); color: var(--pink-strong); }
.btn-ghost{ background: transparent; color: var(--text-muted); }
.btn-danger{ background: var(--red-soft); color: var(--red); }
.btn-block{ width:100%; }
.btn-sm{ padding: 9px 16px; font-size: 13px; }
.btn[disabled]{ opacity:.5; pointer-events:none; }

/* Pet header detail */
.pet-header{
  display:flex; flex-direction:column; align-items:center; text-align:center;
  padding: 10px 0 18px;
}
.pet-header .pet-avatar{ width: 96px; height: 96px; margin-bottom: 12px; box-shadow: 0 0 0 4px var(--pink-soft); }
.pet-header .pet-avatar.placeholder svg{ width:42px; height:42px; }
.pet-header h2{ font-size: 23px; }
.pet-header .meta{ font-size: 14px; color: var(--text-muted); margin-top:4px; }
.pet-header .age-pill{
  margin-top: 10px; background: var(--surface-2); color: var(--pink-strong);
  font-size: 12.5px; font-weight: 700; padding: 5px 14px; border-radius: var(--radius-pill);
}

/* Tabs */
.tabs{
  display:flex; gap:6px; overflow-x:auto; overflow-y:hidden; padding: 4px 0 14px; -ms-overflow-style:none;
  touch-action: pan-x; -webkit-overflow-scrolling: touch; overscroll-behavior-x: contain;
  scroll-snap-type: none; max-width: 100%;
}
.tab{
  flex-shrink:0; padding: 9px 15px; border-radius: var(--radius-pill); font-size: 13.5px;
  font-weight: 700; background: var(--surface-2); color: var(--text-muted); cursor:pointer;
  border: 1px solid transparent; display:flex; align-items:center; gap:6px;
}
.tab.active{ background: var(--pink); color:#fff; }

/* Stamp-style record entry (signature element) */
.record{
  position: relative;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md);
  padding: 14px 14px 14px 16px; margin-bottom: 12px; display:flex; gap:13px; align-items:flex-start;
  box-shadow: var(--shadow-sm);
}
.record-stamp{
  flex-shrink:0; width: 46px; height:46px; border-radius:50%;
  border: 2px dashed var(--pink-soft); display:flex; flex-direction:column; align-items:center; justify-content:center;
  color: var(--pink-strong); line-height:1; transform: rotate(-4deg);
}
.record-stamp .d{ font-family: var(--font-display); font-size: 15px; font-weight:800; }
.record-stamp .m{ font-size: 9px; text-transform: uppercase; font-weight:700; letter-spacing:.04em; }
.record-body{ flex:1; min-width:0; }
.record-body h4{ font-size: 15px; font-weight:700; color: var(--text); }
.record-body .sub{ font-size: 12.5px; color: var(--text-muted); margin-top:2px; }
.record-divider{
  border: none; border-top: 1px dashed var(--border); margin: 10px 0;
}
.record-next{ font-size: 12px; font-weight:700; display:inline-flex; align-items:center; gap:5px; }
.record-thumb{
  width: 44px; height: 44px; border-radius: var(--radius-sm); object-fit: cover; flex-shrink:0;
  border: 1px solid var(--border); cursor: pointer;
}
.record-menu-btn{
  background:none; border:none; padding:4px; cursor:pointer; flex-shrink:0; align-self: center;
}
.record-menu-btn svg{ width:18px; height:18px; stroke: var(--text-faint); fill:none; }

/* Weight chart */
.chart-wrap{ background: var(--surface); border:1px solid var(--border); border-radius: var(--radius-md); padding:16px; margin-bottom: 16px; box-shadow: var(--shadow-sm); }
.chart-wrap .latest{ display:flex; align-items:baseline; gap:6px; margin-bottom:10px; }
.chart-wrap .latest .num{ font-family: var(--font-display); font-size: 28px; color: var(--pink-strong); }
.chart-wrap .latest .unit{ font-size: 14px; color: var(--text-muted); font-weight:600; }
.chart-wrap .latest .delta{ margin-left:auto; font-size:12.5px; font-weight:700; padding:3px 9px; border-radius: var(--radius-pill); }
canvas#weightChart{ width:100%; height: 140px; display:block; }

.weight-gauge{ padding: 4px 2px; }
.weight-gauge-track{ position:relative; height:8px; border-radius:4px; background: var(--surface-2); margin-bottom:8px; }
.weight-gauge-zone{ position:absolute; top:0; bottom:0; border-radius:4px; background: var(--mint-soft); }
.weight-gauge-marker{ position:absolute; top:50%; width:14px; height:14px; border-radius:50%; transform: translate(-50%, -50%); box-shadow:0 0 0 3px var(--surface), var(--shadow-sm); }
.weight-gauge-labels{ display:flex; justify-content:space-between; font-size:11px; font-weight:700; color: var(--text-muted); }

/* Forms / modal */
.sheet-overlay{
  position: fixed; inset:0; background: rgba(58,34,54,.45); z-index: 100;
  display:flex; align-items:flex-end; justify-content:center;
  overflow: hidden; touch-action: pan-y;
  animation: fadein2 .18s ease;
}
@keyframes fadein2{ from{opacity:0;} to{opacity:1;} }
.sheet{
  /* Tamanho: nunca ultrapassa 100vw, nunca menor que a viewport */
  background: var(--bg);
  width: 100%; max-width: min(560px, 100vw);
  max-height: 92vh;
  overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch; overscroll-behavior: contain; touch-action: pan-y;
  border-radius: 26px 26px 0 0;
  padding: 10px 20px calc(26px + var(--safe-bottom));
  box-sizing: border-box;
  box-shadow: var(--shadow-lg); animation: slideup .22s cubic-bezier(.2,.8,.3,1);
  /* Impede que qualquer filho expanda a largura */
  contain: layout style;
}
@keyframes slideup{ from{ transform: translateY(100%); } to{ transform: translateY(0); } }
.sheet-handle{ width:40px; height:5px; background: var(--border); border-radius: 4px; margin: 6px auto 14px; }
.sheet-header{ display:flex; align-items:center; justify-content:space-between; margin-bottom: 16px; }
.sheet-header h3{ font-size:19px; min-width:0; word-break:break-word; }

.field{ margin-bottom: 14px; min-width:0; width:100%; }
.field label{ display:block; font-size: 13px; font-weight:700; color: var(--text-muted); margin-bottom:6px; }
/* Todos os inputs: nunca ultrapassam a largura do pai */
.field input[type=text],
.field input[type=number],
.field input[type=date],
.field input[type=time],
.field input[type=datetime-local],
.field select,
.field textarea{
  display: block;
  width: 100%;
  min-width: 0;
  max-width: 100%;
  padding: 12px 14px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 16px;
  outline: none;
  box-sizing: border-box;
  /* Impede que o picker de data do iOS expanda o input */
  -webkit-appearance: none;
  appearance: none;
}
/* Reaplica o estilo nativo apenas para campos que não são date/time (para manter a UI do picker) */
.field input[type=text],
.field input[type=number],
.field textarea{
  -webkit-appearance: none; appearance: none;
}
/* Para date/time/datetime, mantemos -webkit-appearance: none mas adicionamos ícone manual */
.field input[type=date],
.field input[type=time],
.field input[type=datetime-local]{
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%238C6677' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'><rect x='3.5' y='5' width='17' height='15.5' rx='2'/><path d='M3.5 9.5h17M8 3v3.5M16 3v3.5'/></svg>");
  background-repeat: no-repeat;
  background-position: right 12px center;
  background-size: 18px;
  padding-right: 40px;
  cursor: pointer;
}
.field select{
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%238C6677' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M6 9l6 6 6-6'/></svg>");
  background-repeat: no-repeat; background-position: right 12px center; background-size: 18px; padding-right: 38px;
}
.field input:focus, .field select:focus, .field textarea:focus{ border-color: var(--pink); }
.field textarea{ resize: vertical; min-height: 64px; -webkit-appearance: none; }
/* seg: botões equalizam entre si mas nunca transbordam */
.seg{ display:flex; gap:6px; width:100%; }
.seg button{
  flex:1; min-width:0;
  padding: 11px 6px;
  border-radius: var(--radius-sm); border: 1.5px solid var(--border);
  background: var(--surface); color: var(--text-muted); font-weight:700; cursor:pointer; font-size:13.5px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  box-sizing: border-box;
}
.seg button.active{ background: var(--pink); border-color: var(--pink); color:#fff; }
/* seg-sm: 5 opções (formulário de forma de medicamento) */
.seg.seg-sm button{
  font-size: 12.5px;
  padding: 11px 3px;
}
.photo-upload{
  display:flex; align-items:center; gap:12px; padding: 10px; border: 1.5px dashed var(--border);
  border-radius: var(--radius-md); cursor:pointer; background: var(--surface);
}
.photo-upload img{ width:52px; height:52px; border-radius: var(--radius-sm); object-fit:cover; }
.photo-upload .ph-icon{
  width:52px; height:52px; border-radius: var(--radius-sm); background: var(--surface-2);
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.photo-upload .ph-icon svg{ width:22px; height:22px; stroke: var(--pink-strong); fill:none; }
.photo-upload .txt{ font-size: 13.5px; color: var(--text-muted); font-weight:600; min-width:0; }
.field-row{ display:flex; gap:10px; min-width:0; width:100%; }
.field-row > .field{ flex:1; min-width:0; }

/* Toggle switch (ex.: retorno de consulta) */
.switch-row{
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  padding: 12px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-md);
  background: var(--surface); margin-bottom: 14px;
}
.switch-row .lbl{ font-size:14px; font-weight:700; color: var(--text); }
.switch-row .sub{ font-size:12px; color: var(--text-muted); margin-top:2px; }
.switch{ position:relative; display:inline-block; width:46px; height:27px; flex-shrink:0; cursor:pointer; }
.switch input{ opacity:0; width:0; height:0; position:absolute; }
.switch .track{ position:absolute; inset:0; background: var(--border); border-radius:999px; transition:.18s; }
.switch .track::before{
  content:""; position:absolute; width:21px; height:21px; left:3px; top:3px;
  background:#fff; border-radius:50%; transition:.18s; box-shadow: var(--shadow-sm);
}
.switch input:checked + .track{ background: var(--pink); }
.switch input:checked + .track::before{ transform: translateX(19px); }

/* Anexos (exames): lista dentro do formulário */
.attach-list{ display:flex; flex-direction:column; gap:8px; margin-top:10px; }
.attach-chip{
  display:flex; align-items:center; gap:10px; padding:8px 10px;
  border:1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface);
  min-width:0;
}
.attach-chip .thumb{ width:40px; height:40px; border-radius:8px; object-fit:cover; flex-shrink:0; border:1px solid var(--border); cursor:pointer; }
.attach-chip .icon{
  width:40px; height:40px; border-radius:8px; background: var(--surface-2);
  display:flex; align-items:center; justify-content:center; flex-shrink:0; cursor:pointer;
}
.attach-chip .icon svg{ width:18px; height:18px; stroke: var(--pink-strong); fill:none; }
.attach-chip .name{
  flex:1; min-width:0; font-size:13px; font-weight:600; color: var(--text);
